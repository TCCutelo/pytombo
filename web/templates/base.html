<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bisa{% endblock %}</title>
    <style>
        :root { --ink: #2b2118; --paper: #f6f1e7; --accent: #7a5c3e; }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: Georgia, "Times New Roman", serif;
            color: var(--ink); background: var(--paper); line-height: 1.6;
        }
        header, main, footer { max-width: 760px; margin: 0 auto; padding: 0 1.25rem; }
        header { padding-top: 2.5rem; }
        h1 { font-size: 2.4rem; margin: 0 0 .25rem; }
        .tagline { color: var(--accent); font-style: italic; margin-top: 0; }
        .stats { display: flex; gap: 2rem; margin: 2rem 0; }
        .stat { background: #fff; border: 1px solid #e0d6c4; border-radius: 8px;
                padding: 1rem 1.5rem; }
        .stat .num { font-size: 2rem; font-weight: bold; display: block; }
        .stat .label { color: var(--accent); font-size: .9rem; }
        a.button { display: inline-block; background: var(--accent); color: #fff;
                   text-decoration: none; padding: .6rem 1.2rem; border-radius: 6px; }
        a.button:hover { background: #5e4631; }
        .lead { font-size: 1.2rem; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
                 gap: 1rem; margin: 2rem 0; }
        .card { background: #fff; border: 1px solid #e0d6c4; border-radius: 8px;
                padding: 1.25rem; }
        .card h3 { margin: 0 0 .4rem; }
        .card p { margin: 0; color: #5a4a36; font-size: .95rem; }
        .note { background: #efe7d6; border: 1px dashed #c9b894; border-radius: 8px;
                padding: .9rem 1.1rem; color: #6b5a40; font-size: .95rem; }
        footer { color: #8a7a64; font-size: .85rem; margin: 3rem 0 2rem;
                 border-top: 1px solid #e0d6c4; padding-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>Bisa</h1>
        <p class="tagline">Ajudamos a descobrir e a investigar a sua história de família em Portugal.</p>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        {% block footer %}Bisa — investigação de genealogia portuguesa.
        <a href="{% url 'admin:index' %}">Área de especialistas</a>{% endblock %}
    </footer>
</body>
</html>
